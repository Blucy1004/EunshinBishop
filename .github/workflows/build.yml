name: build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure without bundled network
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Verify network-dependent tests are not registered
        shell: pwsh
        run: |
          $testList = ctest --test-dir build -C Release -N
          if ($testList -match "q_integration_tests") {
            throw "q_integration_tests must not be registered without a network file"
          }

      - name: Perft smoke test
        shell: pwsh
        run: |
          & "build\Release\EunshinBishopQCoreTests.exe" | Tee-Object -Variable coreOutput
          if ($LASTEXITCODE -ne 0) { throw "core tests failed" }
          if (-not ($coreOutput -match "^PASS:")) { throw "missing PASS marker" }

      - name: UCI classical-fallback smoke test
        shell: pwsh
        run: |
          $lines = @("", "uci", "isready", "position startpos", "go depth 2", "quit")
          $output = $lines -join "`n" | & "build\Release\EunshinBishop.exe"
          $output | Select-String -Pattern "^uciok$" -Quiet
          if (-not $?) { throw "missing uciok" }
          $output | Select-String -Pattern "^bestmove " -Quiet
          if (-not $?) { throw "missing bestmove" }

  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Compiler version
        run: |
          $CC --version
          $CXX --version

      - name: Configure without bundled network
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify network-dependent tests are not registered
        run: |
          if ctest --test-dir build -N | grep -q q_integration_tests; then
            echo "q_integration_tests must not be registered without a network file" >&2
            exit 1
          fi

      - name: Perft smoke test
        run: ./build/EunshinBishopQCoreTests | grep -q '^PASS:'

      - name: UCI classical-fallback smoke test
        run: |
          printf 'uci\nisready\nposition startpos\ngo depth 2\nquit\n' \
            | ./build/EunshinBishop | tee /tmp/uci_smoke.log
          grep -q '^uciok$' /tmp/uci_smoke.log
          grep -q '^bestmove ' /tmp/uci_smoke.log
